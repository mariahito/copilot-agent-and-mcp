name: Create Security Alert Issue

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  create-security-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create issue from open Dependabot alert
        env:
          GH_TOKEN: ${{ secrets.CODEQL_SECRET }}
          REPO: ps-copilot-sandbox/copilot-agent-and-mcp
        shell: bash
        run: |
          set -euo pipefail

          # generated-by-copilot: Fetch the first open Dependabot alert for the repository.
          alert_json="$(gh api \
            -H 'Accept: application/vnd.github+json' \
            "/repos/${REPO}/dependabot/alerts" \
            --jq 'map(select(.state=="open"))[0]')"

          if [[ -z "${alert_json}" || "${alert_json}" == "null" ]]; then
            echo "No open Dependabot alerts found."
            exit 0
          fi

          alert_title="$(echo "${alert_json}" | jq -r '.security_advisory.summary // "Unknown alert"')"
          alert_url="$(echo "${alert_json}" | jq -r '.html_url // empty')"

          if [[ -z "${alert_url}" ]]; then
            echo "Alert URL is missing; cannot create issue body."
            exit 1
          fi

          issue_title="Fix alert ${alert_title}"
          issue_body="Fix ${alert_url}"

          # generated-by-copilot: Create the issue using the exact required title/body format.
          gh issue create \
            --repo "${REPO}" \
            --title "${issue_title}" \
            --body "${issue_body}"
